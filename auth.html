<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توكّد — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #080808;
  --surface: #111111;
  --surface2: #181818;
  --border: rgba(255,255,255,0.07);
  --border-gold: rgba(201,168,76,0.25);
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-dim: rgba(201,168,76,0.10);
  --white: #f0ece4;
  --gray: #888077;
  --gray-light: #b5afa6;
  --red: #e05252;
  --green: #52b788;
  --text: #ddd8cf;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  direction: rtl;
  overflow-x: hidden;
}

/* ─── PAGES ─── */
.page { display:none; min-height:100vh; }
.page.active { display:flex; }

/* ══════════════════════════════
   AUTH PAGE
══════════════════════════════ */
#authPage {
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Background grid */
#authPage::before {
  content:'';
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
}

/* Glow */
#authPage::after {
  content:'';
  position:absolute;
  top:-100px; left:50%; transform:translateX(-50%);
  width:500px; height:500px;
  background: radial-gradient(ellipse, rgba(201,168,76,0.07) 0%, transparent 65%);
  pointer-events:none;
}

.auth-card {
  position: relative; z-index:1;
  width: 100%; max-width: 420px;
  margin: 40px 20px;
  background: rgba(17,17,17,0.9);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 40px;
  backdrop-filter: blur(20px);
  box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
}

.auth-logo {
  display:flex; align-items:center; gap:12px;
  justify-content:center; margin-bottom:36px;
}

.auth-logo-icon {
  width:44px; height:44px; border-radius:12px;
  background: var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:800; color:#000;
}

.auth-logo-text {
  font-size:24px; font-weight:700; color:var(--white);
}

.auth-logo-text span { color:var(--gold); }

.auth-tabs {
  display:flex; gap:4px;
  background:var(--surface2);
  border-radius:12px; padding:4px;
  margin-bottom:32px;
}

.auth-tab {
  flex:1; padding:10px;
  background:transparent; border:none;
  border-radius:9px; color:var(--gray);
  font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:14px; font-weight:600;
  cursor:pointer; transition:all 0.2s;
}

.auth-tab.active {
  background:var(--surface);
  color:var(--white);
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
}

.auth-form { display:flex; flex-direction:column; gap:16px; }

.form-group { display:flex; flex-direction:column; gap:7px; }

label {
  font-size:12px; font-weight:600;
  color:var(--gray); letter-spacing:0.3px;
}

.auth-input {
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:12px; padding:14px 16px;
  color:var(--white);
  font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:15px; transition:all 0.2s;
  width:100%; direction:rtl;
}

.auth-input:focus {
  outline:none; border-color:var(--gold);
  background:rgba(201,168,76,0.04);
  box-shadow:0 0 0 3px rgba(201,168,76,0.08);
}

.auth-input::placeholder { color:rgba(255,255,255,0.2); }

.btn-auth {
  width:100%; background:var(--gold); color:#000;
  border:none; border-radius:12px; padding:16px;
  font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:15px; font-weight:700; cursor:pointer;
  transition:all 0.3s; margin-top:4px;
  display:flex; align-items:center; justify-content:center; gap:10px;
  position:relative; overflow:hidden;
}

.btn-auth::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.15) 0%,transparent 60%);
}

.btn-auth:hover { background:var(--gold-light); transform:translateY(-1px); box-shadow:0 8px 24px rgba(201,168,76,0.3); }
.btn-auth:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

.auth-divider {
  display:flex; align-items:center; gap:12px;
  font-size:12px; color:var(--gray); margin:4px 0;
}
.auth-divider::before,.auth-divider::after {
  content:''; flex:1; height:1px; background:var(--border);
}

.btn-google {
  width:100%; background:transparent;
  border:1px solid var(--border); border-radius:12px; padding:14px;
  color:var(--gray-light);
  font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:14px; cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center; gap:10px;
}
.btn-google:hover { border-color:var(--border-gold); color:var(--white); }

.auth-msg {
  font-size:13px; text-align:center; padding:12px 16px;
  border-radius:10px; margin-top:4px; display:none;
}
.auth-msg.error { background:rgba(224,82,82,0.1); border:1px solid rgba(224,82,82,0.2); color:var(--red); }
.auth-msg.success { background:rgba(82,183,136,0.1); border:1px solid rgba(82,183,136,0.2); color:var(--green); }

.auth-footer {
  text-align:center; margin-top:24px;
  font-size:12px; color:var(--gray); line-height:1.6;
}

.spinner-sm {
  width:16px; height:16px;
  border:2px solid rgba(0,0,0,0.2);
  border-top-color:#000; border-radius:50%;
  animation:spin 0.8s linear infinite; display:none;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ══════════════════════════════
   DASHBOARD PAGE
══════════════════════════════ */
#dashPage {
  flex-direction:column;
}

/* Header */
.dash-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 48px; height:64px;
  background:rgba(8,8,8,0.95);
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
  backdrop-filter:blur(20px);
}

.dash-logo {
  display:flex; align-items:center; gap:10px;
}
.dash-logo-icon {
  width:32px; height:32px; background:var(--gold); border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:800; color:#000;
}
.dash-logo-text { font-size:17px; font-weight:700; color:var(--white); }
.dash-logo-text span { color:var(--gold); }

.dash-user {
  display:flex; align-items:center; gap:14px;
}

.user-email {
  font-size:13px; color:var(--gray);
  max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}

.btn-signout {
  background:transparent; border:1px solid var(--border);
  color:var(--gray); border-radius:8px; padding:7px 14px;
  font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:12px; cursor:pointer; transition:all 0.2s;
}
.btn-signout:hover { border-color:var(--red); color:var(--red); }

/* Dashboard body */
.dash-body {
  max-width:1100px; margin:0 auto;
  padding:48px 48px 80px; width:100%;
}

.dash-welcome {
  margin-bottom:48px;
}

.dash-welcome h1 {
  font-size:28px; font-weight:700; color:var(--white);
  margin-bottom:6px;
}

.dash-welcome p { font-size:14px; color:var(--gray); }

/* Stats row */
.stats-row {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:16px; margin-bottom:48px;
}

.stat-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:24px;
  display:flex; align-items:center; gap:16px;
}

.stat-icon {
  width:44px; height:44px; border-radius:12px;
  background:var(--gold-dim);
  display:flex; align-items:center; justify-content:center;
  font-size:20px; flex-shrink:0;
}

.stat-info {}
.stat-val { font-size:24px; font-weight:700; color:var(--white); }
.stat-lbl { font-size:12px; color:var(--gray); margin-top:2px; }

/* Section header */
.section-hd {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:20px;
}

.section-hd h2 {
  font-size:16px; font-weight:700; color:var(--white);
}

.btn-new {
  display:flex; align-items:center; gap:8px;
  background:var(--gold); color:#000;
  border:none; border-radius:10px; padding:10px 20px;
  font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:13px; font-weight:700; cursor:pointer;
  transition:all 0.2s;
}
.btn-new:hover { background:var(--gold-light); transform:translateY(-1px); }

/* Reports grid */
.reports-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:16px;
}

/* Empty state */
.empty-state {
  grid-column:1/-1;
  text-align:center; padding:80px 20px;
  background:var(--surface); border:1px dashed var(--border);
  border-radius:16px;
}

.empty-icon { font-size:48px; margin-bottom:16px; opacity:0.4; }
.empty-state h3 { font-size:16px; color:var(--gray-light); margin-bottom:8px; }
.empty-state p { font-size:13px; color:var(--gray); }

/* Report card */
.report-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:24px;
  cursor:pointer; transition:all 0.25s;
  position:relative; overflow:hidden;
  animation:fadeUp 0.4s ease forwards; opacity:0;
}

.report-card:hover {
  border-color:var(--border-gold);
  transform:translateY(-3px);
  box-shadow:0 12px 32px rgba(0,0,0,0.4);
}

.report-card::before {
  content:''; position:absolute; top:0; right:0;
  width:60px; height:60px;
  background:radial-gradient(circle at top right, rgba(201,168,76,0.06), transparent 70%);
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

.rc-top {
  display:flex; align-items:flex-start; justify-content:space-between;
  margin-bottom:16px;
}

.rc-biz { font-size:16px; font-weight:700; color:var(--white); }
.rc-type {
  font-size:11px; padding:3px 10px;
  background:var(--gold-dim); color:var(--gold);
  border:1px solid var(--border-gold); border-radius:20px;
  font-weight:600;
}

.rc-metrics {
  display:grid; grid-template-columns:1fr 1fr;
  gap:10px; margin-bottom:16px;
}

.rc-metric {
  background:var(--surface2); border-radius:10px;
  padding:10px 12px;
}

.rc-metric-val {
  font-size:15px; font-weight:700; color:var(--gold);
  margin-bottom:2px;
}
.rc-metric-val.pos { color:var(--green); }
.rc-metric-val.neg { color:var(--red); }
.rc-metric-lbl { font-size:11px; color:var(--gray); }

.rc-footer {
  display:flex; align-items:center; justify-content:space-between;
  padding-top:14px; border-top:1px solid var(--border);
}

.rc-date { font-size:12px; color:var(--gray); }

.rc-actions { display:flex; gap:8px; }

.btn-rc {
  background:transparent; border:1px solid var(--border);
  color:var(--gray); border-radius:7px; padding:5px 10px;
  font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:11px; cursor:pointer; transition:all 0.2s;
}
.btn-rc:hover { border-color:var(--border-gold); color:var(--gold); }

.btn-rc.del:hover { border-color:rgba(224,82,82,0.4); color:var(--red); }

/* Loading skeleton */
.skeleton {
  background:linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:8px;
}
@keyframes shimmer { to { background-position:-200% 0; } }

/* Report detail modal */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.85); z-index:500;
  align-items:center; justify-content:center;
  backdrop-filter:blur(8px);
  padding:20px;
}
.modal-overlay.open { display:flex; }

.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:24px; width:100%; max-width:680px;
  max-height:85vh; overflow-y:auto;
  padding:40px;
  box-shadow:0 40px 80px rgba(0,0,0,0.7);
}

.modal-header {
  display:flex; align-items:flex-start; justify-content:space-between;
  margin-bottom:28px;
}

.modal-header h2 { font-size:22px; font-weight:700; color:var(--white); }
.modal-header p { font-size:13px; color:var(--gray); margin-top:4px; }

.btn-close {
  background:var(--surface2); border:1px solid var(--border);
  color:var(--gray); border-radius:8px; width:32px; height:32px;
  cursor:pointer; font-size:16px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}
.btn-close:hover { color:var(--white); border-color:rgba(255,255,255,0.2); }

.modal-kpis {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:12px; margin-bottom:24px;
}

.mkpi {
  background:var(--surface2); border-radius:12px; padding:16px;
  text-align:center;
}
.mkpi-val { font-size:20px; font-weight:700; color:var(--gold); margin-bottom:4px; }
.mkpi-val.pos { color:var(--green); }
.mkpi-val.neg { color:var(--red); }
.mkpi-lbl { font-size:11px; color:var(--gray); }

.modal-body { font-size:14px; line-height:1.9; color:rgba(240,236,228,0.8); }

.modal-section { margin-bottom:20px; }
.modal-section-title {
  font-size:13px; font-weight:700; color:var(--gold);
  margin-bottom:10px; display:flex; align-items:center; gap:8px;
}

.modal-list { list-style:none; display:flex; flex-direction:column; gap:8px; }
.modal-list li {
  padding:10px 14px; background:rgba(255,255,255,0.025);
  border-radius:9px; font-size:13px;
  border-right:2px solid var(--gold-dim);
}

/* Notification toast */
.toast {
  position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
  background:var(--surface2); border:1px solid var(--border-gold);
  color:var(--gold); border-radius:12px; padding:12px 24px;
  font-size:13px; font-weight:600; z-index:1000;
  opacity:0; transition:opacity 0.3s;
  pointer-events:none;
}
.toast.show { opacity:1; }

@media (max-width:640px) {
  .dash-header { padding:0 20px; }
  .dash-body { padding:28px 20px 60px; }
  .stats-row { grid-template-columns:1fr 1fr; }
  .stats-row .stat-card:last-child { grid-column:1/-1; }
  .modal { padding:24px; }
  .modal-kpis { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>

<!-- ══ AUTH PAGE ══ -->
<div class="page active" id="authPage">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">ت</div>
      <div class="auth-logo-text"><span>توكّد</span></div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">تسجيل الدخول</button>
      <button class="auth-tab" onclick="switchTab('register')">إنشاء حساب</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="auth-form">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="loginEmail" class="auth-input" placeholder="example@email.com" dir="ltr">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="loginPass" class="auth-input" placeholder="••••••••" dir="ltr">
      </div>
      <button class="btn-auth" onclick="handleLogin()">
        <span id="loginBtnText">دخول</span>
        <div class="spinner-sm" id="loginSpinner"></div>
      </button>
      <div class="auth-divider">أو</div>
      <button class="btn-google" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        الدخول بـ Google
      </button>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="auth-form" style="display:none;">
      <div class="form-group">
        <label>الاسم</label>
        <input type="text" id="regName" class="auth-input" placeholder="اسمك الكامل">
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="regEmail" class="auth-input" placeholder="example@email.com" dir="ltr">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="regPass" class="auth-input" placeholder="8 أحرف على الأقل" dir="ltr">
      </div>
      <button class="btn-auth" onclick="handleRegister()">
        <span id="regBtnText">إنشاء حساب</span>
        <div class="spinner-sm" id="regSpinner"></div>
      </button>
      <div class="auth-divider">أو</div>
      <button class="btn-google" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        التسجيل بـ Google
      </button>
    </div>

    <div id="authMsg" class="auth-msg"></div>

    <div class="auth-footer">
      بتسجيل دخولك توافق على شروط الاستخدام وسياسة الخصوصية
    </div>
  </div>
</div>

<!-- ══ DASHBOARD PAGE ══ -->
<div class="page" id="dashPage">

  <!-- Header -->
  <header class="dash-header">
    <div class="dash-logo">
      <div class="dash-logo-icon">ت</div>
      <div class="dash-logo-text"><span>توكّد</span></div>
    </div>
    <div class="dash-user">
      <div class="user-email" id="userEmail">—</div>
      <button class="btn-signout" onclick="handleSignOut()">خروج</button>
    </div>
  </header>

  <!-- Body -->
  <div class="dash-body">

    <div class="dash-welcome">
      <h1 id="welcomeMsg">مرحباً 👋</h1>
      <p>هنا تجد جميع تقارير مشاريعك المحفوظة</p>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-info">
          <div class="stat-val" id="statReports">0</div>
          <div class="stat-lbl">تقرير محفوظ</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💹</div>
        <div class="stat-info">
          <div class="stat-val" id="statAvgMargin">—</div>
          <div class="stat-lbl">متوسط هامش الربح</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📅</div>
        <div class="stat-info">
          <div class="stat-val" id="statLastReport">—</div>
          <div class="stat-lbl">آخر تحليل</div>
        </div>
      </div>
    </div>

    <!-- Reports Section -->
    <div class="section-hd">
      <h2>التقارير المحفوظة</h2>
      <button class="btn-new" onclick="goToAnalysis()">+ تحليل جديد</button>
    </div>

    <div class="reports-grid" id="reportsGrid">
      <!-- Populated by JS -->
    </div>

  </div>
</div>

<!-- Report Modal -->
<div class="modal-overlay" id="reportModal" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <div class="modal-header">
      <div>
        <h2 id="modalTitle">اسم المشروع</h2>
        <p id="modalMeta">التاريخ والفترة</p>
      </div>
      <button class="btn-close" onclick="closeModalDirect()">×</button>
    </div>
    <div class="modal-kpis" id="modalKpis"></div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// SUPABASE CONFIG — ضع مفاتيحك هنا
// ══════════════════════════════════════════
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';

let sbClient = null;
let currentUser = null;

// Initialize Supabase if configured
function initSupabase() {
  if (SUPABASE_URL === 'YOUR_SUPABASE_URL') {
    console.warn('Supabase not configured — running in demo mode');
    return false;
  }
  try {
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    return true;
  } catch(e) {
    console.error('Supabase init failed', e);
    return false;
  }
}

// ── DEMO MODE DATA (when Supabase not connected) ──
const DEMO_REPORTS = [
  {
    id: 1,
    biz_name: 'مقهى النخيل',
    biz_type: 'مطعم أو كافيه',
    period: 'شهري',
    revenue: 85000,
    total_expenses: 68000,
    net_profit: 17000,
    net_margin: 20.0,
    report_text: '[SECTION:التشخيص العام]\nالمشروع يحقق أداءً جيداً بهامش ربح 20% وهو أعلى من متوسط القطاع.\n[/SECTION]\n[SECTION:توصيات عملية]\n- تحسين إدارة المخزون لتقليل الهدر\n- التوسع في خدمة التوصيل\n[/SECTION]',
    created_at: new Date(Date.now() - 3 * 24 * 60 * 60 * 1000).toISOString()
  },
  {
    id: 2,
    biz_name: 'متجر الأناقة',
    biz_type: 'متجر تجزئة',
    period: 'شهري',
    revenue: 120000,
    total_expenses: 105000,
    net_profit: 15000,
    net_margin: 12.5,
    report_text: '[SECTION:التشخيص العام]\nالمشروع مستقر مع هامش ربح 12.5% ولكن هناك فرص للتحسين في إدارة التكاليف.\n[/SECTION]\n[SECTION:توصيات عملية]\n- مراجعة تكاليف الإيجار والتفاوض على شروط أفضل\n- تفعيل برنامج ولاء للعملاء\n[/SECTION]',
    created_at: new Date(Date.now() - 10 * 24 * 60 * 60 * 1000).toISOString()
  }
];

// ── AUTH FUNCTIONS ──
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => {
    t.classList.toggle('active', (tab==='login' && i===0) || (tab==='register' && i===1));
  });
  document.getElementById('loginForm').style.display   = tab==='login'    ? 'flex' : 'none';
  document.getElementById('registerForm').style.display = tab==='register' ? 'flex' : 'none';
  hideAuthMsg();
}

function showAuthMsg(msg, type='error') {
  const el = document.getElementById('authMsg');
  el.textContent = msg; el.className = `auth-msg ${type}`; el.style.display = 'block';
}
function hideAuthMsg() {
  document.getElementById('authMsg').style.display = 'none';
}

function setBtnLoading(btnId, spinnerId, loading) {
  document.getElementById(btnId).style.display   = loading ? 'none' : 'inline';
  document.getElementById(spinnerId).style.display = loading ? 'block' : 'none';
  document.getElementById(btnId).closest('button').disabled = loading;
}

async function handleLogin() {
  hideAuthMsg();
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;

  if (!email || !pass) { showAuthMsg('من فضلك أدخل البريد وكلمة المرور'); return; }

  setBtnLoading('loginBtnText','loginSpinner',true);

  if (!supabase) {
    // Demo mode
    await delay(800);
    setBtnLoading('loginBtnText','loginSpinner',false);
    enterDashboard({ email, user_metadata: { name: 'مستخدم تجريبي' } });
    return;
  }

  try {
    const { data, error } = await sbClient.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    enterDashboard(data.user);
  } catch(e) {
    showAuthMsg(translateError(e.message));
  } finally {
    setBtnLoading('loginBtnText','loginSpinner',false);
  }
}

async function handleRegister() {
  hideAuthMsg();
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;

  if (!name || !email || !pass) { showAuthMsg('من فضلك أكمل جميع الحقول'); return; }
  if (pass.length < 8) { showAuthMsg('كلمة المرور يجب أن تكون 8 أحرف على الأقل'); return; }

  setBtnLoading('regBtnText','regSpinner',true);

  if (!supabase) {
    await delay(800);
    setBtnLoading('regBtnText','regSpinner',false);
    showAuthMsg('تم إنشاء الحساب (وضع تجريبي)', 'success');
    setTimeout(() => enterDashboard({ email, user_metadata: { name } }), 1000);
    return;
  }

  try {
    const { data, error } = await sbClient.auth.signUp({
      email, password: pass,
      options: { data: { name } }
    });
    if (error) throw error;
    if (data.user && !data.session) {
      showAuthMsg('تم إنشاء الحساب! تحقق من بريدك لتفعيل الحساب.', 'success');
    } else {
      enterDashboard(data.user);
    }
  } catch(e) {
    showAuthMsg(translateError(e.message));
  } finally {
    setBtnLoading('regBtnText','regSpinner',false);
  }
}

async function handleGoogle() {
  if (!supabase) {
    showAuthMsg('Google Sign-In يحتاج Supabase مفعّل', 'error');
    return;
  }
  const { error } = await sbClient.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
  if (error) showAuthMsg(translateError(error.message));
}

async function handleSignOut() {
  if (sbClient) await sbClient.auth.signOut();
  currentUser = null;
  showPage('authPage');
  showToast('تم تسجيل الخروج');
}

function translateError(msg) {
  if (msg.includes('Invalid login')) return 'البريد أو كلمة المرور غير صحيحة';
  if (msg.includes('Email not confirmed')) return 'الحساب غير مفعّل — تحقق من بريدك';
  if (msg.includes('already registered')) return 'هذا البريد مسجّل مسبقاً';
  if (msg.includes('Password')) return 'كلمة المرور ضعيفة جداً';
  return msg;
}

// ── DASHBOARD ──
function enterDashboard(user) {
  currentUser = user;
  showPage('dashPage');

  const name = user?.user_metadata?.name || user?.email?.split('@')[0] || 'مستخدم';
  document.getElementById('welcomeMsg').textContent = `مرحباً ${name} 👋`;
  document.getElementById('userEmail').textContent = user?.email || '';

  loadReports();
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function loadReports() {
  const grid = document.getElementById('reportsGrid');
  grid.innerHTML = '<div class="skeleton" style="height:180px;border-radius:16px;"></div><div class="skeleton" style="height:180px;border-radius:16px;"></div>';

  let reports = [];

  if (sbClient && currentUser) {
    try {
      const { data, error } = await supabase
        .from('reports')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });
      if (!error) reports = data || [];
    } catch(e) { console.error(e); }
  } else {
    await delay(600);
    reports = DEMO_REPORTS;
  }

  renderReports(reports);
  updateStats(reports);
}

function renderReports(reports) {
  const grid = document.getElementById('reportsGrid');

  if (!reports.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <h3>لا يوجد تقارير محفوظة بعد</h3>
        <p>ابدأ بتحليل مشروعك الأول</p>
      </div>`;
    return;
  }

  grid.innerHTML = reports.map((r, i) => {
    const margin = parseFloat(r.net_margin) || 0;
    const isPos = r.net_profit >= 0;
    const marginClass = margin > 20 ? 'pos' : margin < 5 ? 'neg' : '';
    const date = new Date(r.created_at).toLocaleDateString('ar-SA', { day:'numeric', month:'long', year:'numeric' });

    return `
    <div class="report-card" style="animation-delay:${i*0.06}s" onclick="openReport(${r.id})">
      <div class="rc-top">
        <div class="rc-biz">${r.biz_name || 'مشروع'}</div>
        <div class="rc-type">${r.biz_type || ''}</div>
      </div>
      <div class="rc-metrics">
        <div class="rc-metric">
          <div class="rc-metric-val">${fmtNum(r.revenue)} ر</div>
          <div class="rc-metric-lbl">الإيرادات</div>
        </div>
        <div class="rc-metric">
          <div class="rc-metric-val ${isPos?'pos':'neg'}">${isPos?'+':''}${fmtNum(r.net_profit)} ر</div>
          <div class="rc-metric-lbl">صافي الربح</div>
        </div>
        <div class="rc-metric">
          <div class="rc-metric-val ${marginClass}">${margin.toFixed(1)}%</div>
          <div class="rc-metric-lbl">هامش الربح</div>
        </div>
        <div class="rc-metric">
          <div class="rc-metric-val">${r.period || '—'}</div>
          <div class="rc-metric-lbl">الفترة</div>
        </div>
      </div>
      <div class="rc-footer">
        <div class="rc-date">${date}</div>
        <div class="rc-actions">
          <button class="btn-rc" onclick="event.stopPropagation();openReport(${r.id})">عرض</button>
          <button class="btn-rc del" onclick="event.stopPropagation();deleteReport(${r.id})">حذف</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // Store for modal lookup
  window._reports = reports;
}

function updateStats(reports) {
  document.getElementById('statReports').textContent = reports.length;

  if (reports.length) {
    const avgMargin = reports.reduce((s, r) => s + (parseFloat(r.net_margin)||0), 0) / reports.length;
    document.getElementById('statAvgMargin').textContent = avgMargin.toFixed(1) + '%';

    const latest = new Date(reports[0].created_at);
    const daysAgo = Math.floor((Date.now() - latest) / (1000*60*60*24));
    document.getElementById('statLastReport').textContent = daysAgo === 0 ? 'اليوم' : `${daysAgo} أيام`;
  }
}

async function deleteReport(id) {
  if (!confirm('هل تريد حذف هذا التقرير؟')) return;

  if (sbClient) {
    const { error } = await sbClient.from('reports').delete().eq('id', id);
    if (error) { showToast('خطأ في الحذف'); return; }
  } else {
    const idx = DEMO_REPORTS.findIndex(r => r.id === id);
    if (idx > -1) DEMO_REPORTS.splice(idx, 1);
  }

  showToast('تم حذف التقرير');
  loadReports();
}

function openReport(id) {
  const r = (window._reports || []).find(x => x.id === id);
  if (!r) return;

  const margin = parseFloat(r.net_margin)||0;
  const isPos  = r.net_profit >= 0;

  document.getElementById('modalTitle').textContent = r.biz_name || 'التقرير';
  document.getElementById('modalMeta').textContent  =
    `${r.biz_type || ''} — تحليل ${r.period || ''} — ${new Date(r.created_at).toLocaleDateString('ar-SA')}`;

  document.getElementById('modalKpis').innerHTML = `
    <div class="mkpi">
      <div class="mkpi-val">${fmtNum(r.revenue)} ر</div>
      <div class="mkpi-lbl">الإيرادات</div>
    </div>
    <div class="mkpi">
      <div class="mkpi-val ${isPos?'pos':'neg'}">${isPos?'+':''}${fmtNum(r.net_profit)} ر</div>
      <div class="mkpi-lbl">صافي الربح</div>
    </div>
    <div class="mkpi">
      <div class="mkpi-val ${margin>15?'pos':margin<5?'neg':''}">${margin.toFixed(1)}%</div>
      <div class="mkpi-lbl">هامش الربح</div>
    </div>`;

  // Parse report sections
  const body = document.getElementById('modalBody');
  body.innerHTML = '';

  if (r.report_text) {
    const sections = [...r.report_text.matchAll(/\[SECTION:(.*?)\]([\s\S]*?)\[\/SECTION\]/g)];
    const icons = { 'التشخيص العام':'🩺','نقاط القوة':'✅','نقاط الخطر':'⚠️','تحليل المنتجات':'📊','توصيات عملية':'🎯','توقع الأداء':'📈' };

    sections.forEach(s => {
      const title = s[1].trim();
      const content = s[2].trim();
      const lines = content.split('\n').filter(l=>l.trim());
      const div = document.createElement('div');
      div.className = 'modal-section';
      div.innerHTML = `<div class="modal-section-title">${icons[title]||'📌'} ${title}</div>
        <ul class="modal-list">${lines.map(l=>`<li>${l.replace(/^[-•]\s*/,'')}</li>`).join('')}</ul>`;
      body.appendChild(div);
    });
  } else {
    body.innerHTML = '<p style="color:var(--gray);font-size:14px;">لا يوجد تفاصيل إضافية لهذا التقرير.</p>';
  }

  document.getElementById('reportModal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('reportModal')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('reportModal').classList.remove('open');
}

function goToAnalysis() {
  // In real app: navigate to analysis page or open in new tab
  showToast('يتم فتح صفحة التحليل...');
  setTimeout(() => window.open('tawakkad-v2.html', '_blank'), 500);
}

// ── UTILS ──
const fmtNum = n => {
  const abs = Math.abs(n);
  if (abs >= 1e6) return (n/1e6).toFixed(1)+'م';
  if (abs >= 1e3) return (n/1e3).toFixed(1)+'ك';
  return n.toLocaleString('ar-SA');
};

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──
(async () => {
  initSupabase();

  if (sbClient) {
    // Check existing session
    const { data: { session } } = await sbClient.auth.getSession();
    if (session?.user) {
      enterDashboard(session.user);
    }

    // Auth state listener
    sbClient.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session?.user) {
        enterDashboard(session.user);
      } else if (event === 'SIGNED_OUT') {
        showPage('authPage');
      }
    });
  }
})();

// ── EXPOSE SAVE FUNCTION for analysis page ──
// Call this from tawakkad-v2.html after analysis:
// window.opener?.saveReport?.({...})
window.saveReport = async (data) => {
  if (!currentUser) return;
  const record = {
    user_id: currentUser.id,
    biz_name: data.bizName,
    biz_type: data.bizType,
    period: data.period,
    revenue: data.revenue,
    total_expenses: data.totalExpenses,
    net_profit: data.netProfit,
    net_margin: parseFloat(data.netMargin),
    report_text: data.reportText,
    created_at: new Date().toISOString()
  };

  if (sbClient) {
    const { error } = await sbClient.from('reports').insert(record);
    if (!error) showToast('تم حفظ التقرير ✓');
  } else {
    DEMO_REPORTS.unshift({ id: Date.now(), ...record });
    loadReports();
    showToast('تم حفظ التقرير ✓');
  }
};
</script>
</body>
</html>
