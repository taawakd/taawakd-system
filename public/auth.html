<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توكّد — تسجيل الدخول</title>
<!-- Favicons -->
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#c9a84c">
<!-- / Favicons -->
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#07080a;--s1:#0f1014;--s2:#16171c;--border:rgba(255,255,255,0.07);--gold:#c8a45a;--gold2:#e8c97a;--gold-d:rgba(200,164,90,0.10);--gold-b:rgba(200,164,90,0.22);--white:#edeae2;--gray:#7a7670;--gray2:#a8a49c;--red:#d95f5f;--red-d:rgba(217,95,95,0.12);--green:#4caf82;--green-d:rgba(76,175,130,0.12);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(200,164,90,0.08),transparent);pointer-events:none;}
.auth-wrap{width:100%;max-width:420px;padding:24px;}
.logo{text-align:center;margin-bottom:36px;}
.logo-icon{width:52px;height:52px;background:var(--gold);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#000;margin:0 auto 14px;}
.logo h1{font-size:26px;font-weight:700;}.logo h1 span{color:var(--gold);}
.logo p{font-size:13px;color:var(--gray);margin-top:5px;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:32px;}
.tabs{display:flex;background:var(--s2);border-radius:12px;padding:4px;margin-bottom:28px;}
.tab{flex:1;padding:9px;background:transparent;border:none;border-radius:9px;color:var(--gray);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.tab.active{background:var(--s1);color:var(--white);box-shadow:0 2px 8px rgba(0,0,0,0.4);}
.form-group{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:600;color:var(--gray);margin-bottom:7px;}
.input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:13px 15px;color:var(--white);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:14px;transition:all 0.2s;direction:rtl;}
.input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,164,90,0.08);}
.input::placeholder{color:rgba(255,255,255,0.18);}
.btn{width:100%;padding:14px;border-radius:12px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;border:none;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-primary{background:var(--gold);color:#000;margin-top:6px;}
.btn-primary:hover{background:var(--gold2);transform:translateY(-1px);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-google{background:var(--s2);color:var(--white);border:1px solid var(--border);margin-bottom:20px;}
.btn-google:hover{border-color:var(--gold-b);}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:12px;color:var(--gray);}
.msg{font-size:13px;padding:12px 15px;border-radius:10px;margin-top:14px;display:none;text-align:center;}
.msg.error{background:var(--red-d);border:1px solid rgba(217,95,95,0.2);color:#e88;}
.msg.success{background:var(--green-d);border:1px solid rgba(76,175,130,0.2);color:#7dd5a8;}
.footer-note{text-align:center;font-size:12px;color:var(--gray);margin-top:20px;line-height:1.6;}
.spin{width:18px;height:18px;border:2px solid rgba(0,0,0,0.2);border-top-color:#000;border-radius:50%;animation:spin 0.8s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.success-wrap{text-align:center;padding:20px 0;display:none;}
.success-wrap .si{font-size:48px;margin-bottom:16px;}
.success-wrap h2{font-size:20px;font-weight:700;margin-bottom:8px;}
.success-wrap p{font-size:13px;color:var(--gray2);line-height:1.7;}
</style>
<script src="/api/config.js"></script>
</head>
<body>
<div class="auth-wrap">
  <div class="logo">
    <div class="logo-icon">ت</div>
    <h1><span>توكّد</span></h1>
    <p>يقين قبل الاستثمار</p>
  </div>
  <div class="card">
    <button class="btn btn-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      متابعة بـ Google
    </button>
    <div class="divider"><span>أو بالبريد الإلكتروني</span></div>
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">تسجيل الدخول</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">حساب جديد</button>
    </div>
    <div id="loginForm">
      <div class="form-group"><label>البريد الإلكتروني</label><input class="input" type="email" id="login-email" placeholder="you@example.com" dir="ltr"></div>
      <div class="form-group"><label>كلمة المرور</label><input class="input" type="password" id="login-pass" placeholder="••••••••" dir="ltr" onkeydown="if(event.key==='Enter')signIn()"></div>
      <button class="btn btn-primary" onclick="signIn()" id="loginBtn"><span id="loginBtnText">دخول</span><div class="spin" id="loginSpin"></div></button>
      <div style="text-align:center;margin-top:14px;"><a href="#" onclick="showReset();return false;" style="font-size:12px;color:var(--gray);text-decoration:none;">نسيت كلمة المرور؟</a></div>
    </div>
    <div id="registerForm" style="display:none;">
      <div class="form-group"><label>الاسم</label><input class="input" type="text" id="reg-name" placeholder="اسمك الكامل"></div>
      <div class="form-group"><label>البريد الإلكتروني</label><input class="input" type="email" id="reg-email" placeholder="you@example.com" dir="ltr"></div>
      <div class="form-group"><label>كلمة المرور</label><input class="input" type="password" id="reg-pass" placeholder="8 أحرف على الأقل" dir="ltr" onkeydown="if(event.key==='Enter')signUp()"></div>
      <button class="btn btn-primary" onclick="signUp()" id="registerBtn"><span id="registerBtnText">إنشاء حساب مجاني</span><div class="spin" id="registerSpin"></div></button>
    </div>
    <div id="resetForm" style="display:none;">
      <div class="form-group"><label>البريد الإلكتروني</label><input class="input" type="email" id="reset-email" placeholder="you@example.com" dir="ltr"></div>
      <button class="btn btn-primary" onclick="sendReset()">إرسال رابط الاستعادة</button>
      <div style="text-align:center;margin-top:12px;"><a href="#" onclick="switchTab('login');return false;" style="font-size:12px;color:var(--gray);text-decoration:none;">← العودة</a></div>
    </div>
    <div class="success-wrap" id="verifySuccess"><div class="si">📧</div><h2>تحقق من بريدك</h2><p>أرسلنا رابط تأكيد.<br>افتحه وستنتقل تلقائياً للتطبيق.</p></div>
    <div class="msg error" id="authError"></div>
    <div class="msg success" id="authSuccess"></div>
  </div>
  <div class="footer-note">بتسجيلك توافق على شروط الاستخدام<br><span style="color:var(--gold);">النسخة المجانية: 3 تحليلات</span></div>
</div>
<script>
const SUPABASE_URL  = window.__SUPABASE_URL__  || '';
const SUPABASE_ANON = window.__SUPABASE_ANON__ || '';
let sb;
try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON); } catch(e){}

(async()=>{ if(!sb)return; const{data:{session}}=await sb.auth.getSession(); if(session) window.location.href='https://app.towkd.com'; })();

function switchTab(tab){
  ['login','register'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById(t+'Form').style.display = t===tab?'block':'none';
  });
  document.getElementById('resetForm').style.display='none';
  document.getElementById('verifySuccess').style.display='none';
  hideMsg();
}
function showReset(){ document.getElementById('loginForm').style.display='none'; document.getElementById('resetForm').style.display='block'; }
async function signInGoogle(){ if(!sb)return showErr('Supabase غير مهيّأ'); const{error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:'https://app.towkd.com'}}); if(error)showErr(error.message); }
async function signIn(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  if(!email||!pass)return showErr('أدخل البريد وكلمة المرور');
  setLoad('login',true);
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  setLoad('login',false);
  if(error){ const m=error.message.includes('Invalid')?'البريد أو كلمة المرور غير صحيحة':error.message.includes('confirmed')?'تحقق من بريدك أولاً':error.message; return showErr(m); }
  window.location.href='https://app.towkd.com';
}
async function signUp(){
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value;
  if(!name)return showErr('أدخل اسمك'); if(!email)return showErr('أدخل البريد'); if(pass.length<8)return showErr('كلمة المرور 8 أحرف على الأقل');
  setLoad('register',true);
  const{error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
  setLoad('register',false);
  if(error)return showErr(error.message.includes('already')?'هذا البريد مسجّل مسبقاً':error.message);
  document.getElementById('registerForm').style.display='none';
  document.getElementById('verifySuccess').style.display='block';
}
async function sendReset(){
  const email=document.getElementById('reset-email').value.trim();
  if(!email)return showErr('أدخل بريدك');
  const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://app.towkd.com/auth.html'});
  if(error)return showErr(error.message);
  document.getElementById('resetForm').style.display='none';
  document.getElementById('authSuccess').textContent='✓ تم إرسال رابط الاستعادة';
  document.getElementById('authSuccess').style.display='block';
}
function showErr(m){ const e=document.getElementById('authError'); e.textContent=m; e.style.display='block'; setTimeout(()=>e.style.display='none',4000); }
function hideMsg(){ document.getElementById('authError').style.display='none'; document.getElementById('authSuccess').style.display='none'; }
function setLoad(f,v){ document.getElementById(f+'Btn').disabled=v; document.getElementById(f+'BtnText').style.display=v?'none':'inline'; document.getElementById(f+'Spin').style.display=v?'block':'none'; }
</script>
</body>
</html>
