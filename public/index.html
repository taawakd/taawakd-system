<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توكّد — تشخيص مالي ذكي</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:#07080a;--s1:#0f1014;--s2:#16171c;--s3:#1e1f26;
  --border:rgba(255,255,255,0.06);--bg:rgba(255,255,255,0.04);
  --gold:#c8a45a;--gold2:#e8c97a;--gold-d:rgba(200,164,90,0.12);--gold-b:rgba(200,164,90,0.22);
  --white:#edeae2;--gray:#7a7670;--gray2:#a8a49c;
  --red:#d95f5f;--red-d:rgba(217,95,95,0.12);
  --green:#4caf82;--green-d:rgba(76,175,130,0.12);
  --blue:#5b8fcc;--blue-d:rgba(91,143,204,0.12);
  --warn:#d4893a;--warn-d:rgba(212,137,58,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:#07080a;color:var(--white);min-height:100vh;direction:rtl;overflow-x:hidden;}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh;}
.sidebar{width:240px;background:var(--s1);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;right:0;bottom:0;z-index:100;}
.main-area{margin-right:240px;flex:1;min-height:100vh;}

/* ── SIDEBAR ── */
.sb-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
.sb-logo-mark{display:flex;align-items:center;gap:10px;}
.sb-icon{width:36px;height:36px;background:var(--gold);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#000;flex-shrink:0;}
.sb-name{font-size:18px;font-weight:700;color:var(--white);}
.sb-name span{color:var(--gold);}
.sb-tagline{font-size:11px;color:var(--gray);margin-top:4px;}

.sb-nav{padding:16px 12px;flex:1;overflow-y:auto;}
.sb-section{font-size:10px;font-weight:700;color:var(--gray);letter-spacing:1.5px;text-transform:uppercase;padding:4px 8px 10px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all 0.2s;margin-bottom:2px;font-size:13px;color:var(--gray2);border:1px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--white);}
.nav-item.active{background:var(--gold-d);color:var(--gold);border-color:var(--gold-b);}
.nav-icon{font-size:15px;width:20px;text-align:center;}

.sb-bottom{padding:16px 12px;border-top:1px solid var(--border);}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--s2);}
.sb-user-av{width:32px;height:32px;border-radius:50%;background:var(--gold-d);border:1px solid var(--gold-b);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gold);font-weight:700;flex-shrink:0;}
.sb-user-info{flex:1;overflow:hidden;}
.sb-user-name{font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-user-plan{font-size:11px;color:var(--gray);}

/* ── HEADER ── */
.page-header{padding:28px 36px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
.page-title h1{font-size:22px;font-weight:700;color:var(--white);margin-bottom:4px;}
.page-title p{font-size:13px;color:var(--gray);}
.header-actions{display:flex;gap:10px;align-items:center;flex-shrink:0;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;border:none;}
.btn-primary{background:var(--gold);color:#000;}
.btn-primary:hover{background:var(--gold2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(200,164,90,0.3);}
.btn-ghost{background:transparent;color:var(--gray2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--gold-b);color:var(--gold);}
.btn-danger{background:var(--red-d);color:var(--red);border:1px solid rgba(217,95,95,0.2);}
.btn-danger:hover{background:rgba(217,95,95,0.2);}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;}
.btn-sm{padding:7px 14px;font-size:12px;}

/* ── PAGES ── */
.page{display:none;padding:28px 36px 60px;}
.page.active{display:block;}
#page-cfo.active{display:flex;flex-direction:column;padding-bottom:24px;}

/* ── CARDS ── */
.card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:24px;}
.card-sm{padding:18px;}
.card-title{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.card-title-icon{width:26px;height:26px;background:var(--gold-d);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;}

/* ── KPI GRID ── */
.kpi-row{display:grid;gap:14px;margin-bottom:20px;}
.kpi-row-4{grid-template-columns:repeat(4,1fr);}
.kpi-row-3{grid-template-columns:repeat(3,1fr);}
.kpi-row-2{grid-template-columns:repeat(2,1fr);}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:20px;transition:border-color 0.2s;}
.kpi:hover{border-color:var(--gold-b);}
.kpi.gold{border-color:var(--gold-b);background:var(--gold-d);}
.kpi-val{font-size:24px;font-weight:700;color:var(--gold);line-height:1;margin-bottom:6px;}
.kpi-val.pos{color:var(--green);}
.kpi-val.neg{color:var(--red);}
.kpi-val.neu{color:var(--white);}
.kpi-val.warn{color:var(--warn);}
.kpi-label{font-size:12px;color:var(--gray);line-height:1.4;}
.kpi-sub{font-size:11px;color:var(--gray);margin-top:4px;}

/* ── GRID LAYOUTS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.col-span-2{grid-column:1/-1;}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:7px;}
.form-group.full{grid-column:1/-1;}
label{font-size:12px;font-weight:600;color:var(--gray);letter-spacing:0.3px;}
.input{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--white);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:14px;transition:all 0.2s;direction:rtl;width:100%;}
.input:focus{outline:none;border-color:var(--gold);background:rgba(200,164,90,0.04);box-shadow:0 0 0 3px rgba(200,164,90,0.08);}
.input::placeholder{color:rgba(255,255,255,0.18);}
select.input option{background:#1a1a1a;}
textarea.input{resize:vertical;min-height:80px;}

/* ── TABS ── */
.tabs{display:flex;gap:4px;background:var(--s2);border-radius:12px;padding:4px;margin-bottom:24px;}
.tab{flex:1;padding:9px;background:transparent;border:none;border-radius:9px;color:var(--gray);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.tab.active{background:var(--s1);color:var(--white);box-shadow:0 2px 8px rgba(0,0,0,0.4);}

/* ── BENCHMARK ── */
.bench-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--s2);border-radius:12px;margin-bottom:10px;border-right:3px solid transparent;}
.bench-item.good{border-right-color:var(--green);}
.bench-item.warn{border-right-color:var(--warn);}
.bench-item.bad{border-right-color:var(--red);}
.bench-label{font-size:13px;color:var(--white);font-weight:500;flex:1;}
.bench-yours{font-size:13px;font-weight:700;}
.bench-range{font-size:11px;color:var(--gray);margin-top:2px;}
.bench-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;flex-shrink:0;}
.badge-good{background:var(--green-d);color:var(--green);}
.badge-warn{background:var(--warn-d);color:var(--warn);}
.badge-bad{background:var(--red-d);color:var(--red);}

/* ── PROGRESS BAR ── */
.progress-wrap{margin-bottom:12px;}
.progress-head{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;}
.progress-track{height:6px;background:var(--s3);border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;border-radius:10px;transition:width 0.8s ease;}

/* ── PRODUCTS TABLE ── */
.prod-head{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 38px;gap:10px;padding:0 4px;margin-bottom:10px;}
.prod-head span{font-size:11px;color:var(--gray);font-weight:600;letter-spacing:0.5px;}
.prod-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 38px;gap:10px;margin-bottom:10px;align-items:center;}
.prod-row .input{padding:9px 12px;font-size:13px;}
.btn-rm{background:var(--red-d);border:1px solid rgba(217,95,95,0.2);color:var(--red);border-radius:8px;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all 0.2s;flex-shrink:0;padding:0;}
.btn-rm:hover{background:rgba(217,95,95,0.25);}

/* ── ALERTS ── */
.alert{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:12px;margin-bottom:10px;font-size:13px;line-height:1.6;}
.alert-warn{background:var(--warn-d);border:1px solid rgba(212,137,58,0.25);color:var(--warn);}
.alert-danger{background:var(--red-d);border:1px solid rgba(217,95,95,0.25);color:var(--red);}
.alert-good{background:var(--green-d);border:1px solid rgba(76,175,130,0.25);color:var(--green);}
.alert-info{background:var(--blue-d);border:1px solid rgba(91,143,204,0.25);color:var(--blue);}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px;}

/* ── SCORE RING ── */
.score-wrap{display:flex;flex-direction:column;align-items:center;padding:20px;}
.score-ring{position:relative;width:140px;height:140px;}
.score-ring svg{transform:rotate(-90deg);}
.score-ring-bg{fill:none;stroke:var(--s3);stroke-width:10;}
.score-ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease;}
.score-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-val{font-size:32px;font-weight:700;line-height:1;}
.score-max{font-size:12px;color:var(--gray);}
.score-label{font-size:13px;color:var(--gray2);margin-top:12px;font-weight:500;}

/* ── SCENARIO ── */
.scenario-card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:all 0.2s;}
.scenario-card:hover{border-color:var(--gold-b);}
.scenario-card.active-sc{border-color:var(--gold);background:var(--gold-d);}
.sc-title{font-size:14px;font-weight:600;color:var(--white);margin-bottom:8px;}
.sc-desc{font-size:12px;color:var(--gray);margin-bottom:14px;line-height:1.6;}
.sc-result{font-size:22px;font-weight:700;color:var(--gold);}
.sc-result.pos{color:var(--green);}
.sc-result.neg{color:var(--red);}
.sc-delta{font-size:12px;margin-top:4px;}

/* ── COMPARE ── */
.compare-row{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;margin-bottom:10px;}
.compare-period{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
.compare-period-label{font-size:11px;color:var(--gold);font-weight:600;letter-spacing:0.5px;margin-bottom:8px;}
.compare-metric{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
.compare-metric:last-child{margin-bottom:0;}
.compare-metric-val{font-weight:700;}
.compare-arrow{font-size:20px;color:var(--gray);text-align:center;}
.delta-positive{color:var(--green);}
.delta-negative{color:var(--red);}
.delta-neutral{color:var(--gray);}

/* ── CHART CONTAINER ── */
.chart-wrap{position:relative;height:240px;margin-top:8px;}

/* ── INSIGHTS LIST ── */
.insight-list{display:flex;flex-direction:column;gap:10px;}
.insight-item{display:flex;gap:12px;align-items:flex-start;padding:13px 16px;border-radius:10px;background:rgba(255,255,255,0.025);border-right:3px solid transparent;font-size:13px;line-height:1.7;color:rgba(237,234,226,0.82);}
.insight-item.g{border-right-color:var(--green);}
.insight-item.w{border-right-color:var(--warn);}
.insight-item.r{border-right-color:var(--red);}
.ii-icon{font-size:14px;flex-shrink:0;margin-top:2px;}

/* ── PROD ANALYSIS ── */
.prod-analysis-row{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--s2);border-radius:12px;margin-bottom:10px;}
.prod-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.rank-1{background:rgba(200,164,90,0.2);color:var(--gold);}
.rank-2{background:rgba(255,255,255,0.06);color:var(--gray2);}
.rank-3{background:rgba(255,255,255,0.04);color:var(--gray);}
.prod-an-name{font-size:14px;font-weight:600;color:var(--white);flex:1;}
.prod-an-margin{font-size:13px;font-weight:700;}
.prod-an-contrib{font-size:11px;color:var(--gray);}
.prod-an-bar{height:4px;background:var(--s3);border-radius:10px;margin-top:6px;overflow:hidden;}
.prod-an-fill{height:100%;border-radius:10px;}

/* ── LOADING ── */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(7,8,10,0.85);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.loading-overlay.show{display:flex;}
.loading-box{text-align:center;}
.loading-ring{width:56px;height:56px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-box p{color:var(--gray2);font-size:15px;}
.loading-box small{font-size:12px;color:var(--gray);display:block;margin-top:6px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--gold-b);color:var(--gold);border-radius:12px;padding:12px 24px;font-size:13px;font-weight:600;z-index:1000;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* ── ERROR/SUCCESS MSG ── */
.msg{font-size:13px;padding:12px 16px;border-radius:10px;margin-top:12px;display:none;}
.msg.error{background:var(--red-d);border:1px solid rgba(217,95,95,0.25);color:var(--red);}
.msg.success{background:var(--green-d);border:1px solid rgba(76,175,130,0.25);color:var(--green);}

/* ── SPINNER INLINE ── */
.spin-sm{width:16px;height:16px;border:2px solid rgba(0,0,0,0.2);border-top-color:#000;border-radius:50%;animation:spin 0.8s linear infinite;display:none;}

/* ── EXCEL ZONE ── */
.excel-zone{border:1px dashed var(--gold-b);border-radius:14px;padding:28px;text-align:center;cursor:pointer;transition:all 0.3s;background:var(--gold-d);margin-bottom:20px;position:relative;overflow:hidden;}
.excel-zone:hover,.excel-zone.drag-over{border-color:var(--gold);background:rgba(200,164,90,0.08);}
.excel-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.excel-zone h3{font-size:14px;font-weight:600;color:var(--white);margin-bottom:6px;}
.excel-zone p{font-size:12px;color:var(--gray);}

/* ── LIVE CALC ── */
.live-bar{display:none;background:var(--s2);border-radius:12px;padding:16px 20px;margin-top:16px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;border:1px solid var(--border);}
.live-item{text-align:center;}
.live-val{font-size:17px;font-weight:700;color:var(--gold);}
.live-lbl{font-size:11px;color:var(--gray);margin-top:3px;}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{display:none;}
  .main-area{margin-right:0;}
  .page{padding:20px 16px 60px;}
  .kpi-row-4{grid-template-columns:1fr 1fr;}
  .form-grid{grid-template-columns:1fr;}
  .grid-2,.grid-3{grid-template-columns:1fr;}
  .prod-head{display:none;}
  .prod-row{grid-template-columns:1fr 1fr;}.prod-row .input:first-child{grid-column:1/-1;}
  .page-header{flex-direction:column;}
  .live-bar{grid-template-columns:1fr 1fr;}
}

/* ── AI CFO ── */
.cfo-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;}
.cfo-messages{flex:1;overflow-y:auto;padding:20px 0;display:flex;flex-direction:column;gap:16px;}
.cfo-msg{display:flex;gap:12px;animation:fadeUp 0.3s ease;}
.cfo-msg.user{flex-direction:row-reverse;}
.cfo-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.cfo-avatar.ai{background:var(--gold-d);border:1px solid var(--gold-b);}
.cfo-avatar.user{background:var(--s3);border:1px solid var(--border);}
.cfo-bubble{max-width:75%;padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.8;}
.cfo-bubble.ai{background:var(--s2);border:1px solid var(--border);border-top-right-radius:4px;color:var(--white);}
.cfo-bubble.user{background:var(--gold-d);border:1px solid var(--gold-b);border-top-left-radius:4px;color:var(--white);}
.cfo-bubble strong{color:var(--gold);}
.cfo-bubble ul{padding-right:16px;margin-top:8px;}
.cfo-bubble li{margin-bottom:6px;}
.cfo-input-row{display:flex;gap:10px;padding-top:16px;border-top:1px solid var(--border);}
.cfo-input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--white);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:14px;resize:none;max-height:120px;direction:rtl;}
.cfo-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,164,90,0.08);}
.cfo-send{background:var(--gold);color:#000;border:none;border-radius:12px;width:48px;height:48px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
.cfo-send:hover{background:var(--gold2);transform:scale(1.05);}
.cfo-send:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.cfo-suggestions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.cfo-chip{background:var(--s2);border:1px solid var(--border);color:var(--gray2);border-radius:20px;padding:7px 14px;font-size:12px;cursor:pointer;transition:all 0.2s;font-family:'IBM Plex Sans Arabic',sans-serif;}
.cfo-chip:hover{border-color:var(--gold-b);color:var(--gold);background:var(--gold-d);}
.typing-dot{display:inline-block;width:6px;height:6px;background:var(--gold);border-radius:50%;margin:0 2px;animation:blink 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{opacity:0.2;}40%{opacity:1;}}
.cfo-context-bar{background:var(--s2);border:1px solid var(--gold-b);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;}
.cfo-context-dot{width:8px;height:8px;background:var(--green);border-radius:50%;flex-shrink:0;}

/* ── NEW FEATURE PAGES ── */
.feature-empty{text-align:center;padding:60px 20px;color:var(--gray);font-size:14px;}
.feature-empty .fe-icon{font-size:48px;margin-bottom:16px;opacity:0.3;}

/* Action Plan */
.week-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;}
.week-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.week-num{width:40px;height:40px;background:var(--gold-d);border:1px solid var(--gold-b);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gold);font-size:14px;flex-shrink:0;}
.week-title{font-size:16px;font-weight:700;color:var(--white);}

<script>
// ── Auth Guard — يمنع الدخول بدون تسجيل ──
(async function() {
  // انتظر config.js يحمّل المتغيرات
  await new Promise(r => setTimeout(r, 300));

  const url  = window.__SUPABASE_URL__  || '';
  const anon = window.__SUPABASE_ANON__ || '';
  if (!url || !anon) return; // لو Supabase مش مهيّأ، اشتغل بدون auth

  const sb = window.supabase.createClient(url, anon);
  sb = sb; // expose for global use

  // استرداد الـ token عند تحميل الصفحة
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) {
      window.__AUTH_TOKEN__ = session.access_token;
      window.__USER__ = session.user.id;
    }
  });
  const { data: { session } } = await sb.auth.getSession();

  if (!session) {
    // مافي جلسة — حوّل لصفحة الدخول
    window.location.href = '/auth.html';
    return;
  }

  // ✅ جلسة موجودة — خزّن التوكن للاستخدام في API calls
  window.__AUTH_TOKEN__ = session.access_token;
  window.__USER__ = session.user;

  // تحديث التوكن تلقائياً عند انتهائه
  // تتبع المستخدم الحالي لكشف تبديل الحسابات
  const prevUserId = localStorage.getItem('tw_user_id');
  const currUserId = session.user.id;

  if (prevUserId && prevUserId !== currUserId) {
    // مستخدم مختلف — امسح بيانات المستخدم السابق
    const keysToKeep = ['tw_user_id'];
    const allKeys = Object.keys(localStorage);
    allKeys.forEach(k => {
      if (!keysToKeep.includes(k)) localStorage.removeItem(k);
    });
  }
  // حفظ ID المستخدم الحالي
  localStorage.setItem('tw_user_id', currUserId);

  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT') {
      localStorage.removeItem('tw_user_id');
      window.__USER__ = null;
      window.__AUTH_TOKEN__ = null;
      window.bpContext = '';
      window.CFO_HISTORY = [];
      window.location.href = '/auth.html';
    } else if (event === 'SIGNED_IN' && session) {
      const prev = localStorage.getItem('tw_user_id');
      if (prev && prev !== session.user.id) {
        // حساب مختلف — امسح البيانات القديمة
        Object.keys(localStorage).forEach(k => {
          if (k !== 'tw_user_id') localStorage.removeItem(k);
        });
      }
      localStorage.setItem('tw_user_id', session.user.id);
      window.__AUTH_TOKEN__ = session.access_token;
      // تصفير بيانات المستخدم السابق
      window.bpContext = '';
      window.CFO_HISTORY = [];
      // مسح التقارير المحفوظة من المستخدم السابق وإعادة جلبها من Supabase
      localStorage.removeItem('tw_reports');
      STATE.savedReports = [];
      loadReportsFromDB();
    }
  });

  // إظهار اسم المستخدم في الواجهة
  const name = session.user?.user_metadata?.full_name
    || session.user?.email?.split('@')[0]
    || 'مستخدم';
  const greetEl = document.getElementById('userName');
  if (greetEl) greetEl.textContent = name;
})();

// ── تسجيل الخروج ──
function signOut() {
  const url  = window.__SUPABASE_URL__  || '';
  const anon = window.__SUPABASE_ANON__ || '';
  if (!url) { window.location.href = '/auth.html'; return; }

<script>
// ── Auth Guard — يمنع الدخول بدون تسجيل ──
(async function() {
  // انتظر config.js يحمّل المتغيرات
  await new Promise(r => setTimeout(r, 300));

  const url  = window.__SUPABASE_URL__  || '';
  const anon = window.__SUPABASE_ANON__ || '';
  if (!url || !anon) return; // لو Supabase مش مهيّأ، اشتغل بدون auth

  const sb = window.supabase.createClient(url, anon);
  sb = sb; // expose for global use

  // استرداد الـ token عند تحميل الصفحة
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) {
      window.__AUTH_TOKEN__ = session.access_token;
      window.__USER__ = session.user.id;
    }
  });
  const { data: { session } } = await sb.auth.getSession();

  if (!session) {
    // مافي جلسة — حوّل لصفحة الدخول
    window.location.href = '/auth.html';
    return;
  }

  // ✅ جلسة موجودة — خزّن التوكن للاستخدام في API calls
  window.__AUTH_TOKEN__ = session.access_token;
  window.__USER__ = session.user;

  // تحديث التوكن تلقائياً عند انتهائه
  // تتبع المستخدم الحالي لكشف تبديل الحسابات
  const prevUserId = localStorage.getItem('tw_user_id');
  const currUserId = session.user.id;

  if (prevUserId && prevUserId !== currUserId) {
    // مستخدم مختلف — امسح بيانات المستخدم السابق
    const keysToKeep = ['tw_user_id'];
    const allKeys = Object.keys(localStorage);
    allKeys.forEach(k => {
      if (!keysToKeep.includes(k)) localStorage.removeItem(k);
    });
  }
  // حفظ ID المستخدم الحالي
  localStorage.setItem('tw_user_id', currUserId);

  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT') {
      localStorage.removeItem('tw_user_id');
      window.__USER__ = null;
      window.__AUTH_TOKEN__ = null;
      window.bpContext = '';
      window.CFO_HISTORY = [];
      window.location.href = '/auth.html';
    } else if (event === 'SIGNED_IN' && session) {
      const prev = localStorage.getItem('tw_user_id');
      if (prev && prev !== session.user.id) {
        // حساب مختلف — امسح البيانات القديمة
        Object.keys(localStorage).forEach(k => {
          if (k !== 'tw_user_id') localStorage.removeItem(k);
        });
      }
      localStorage.setItem('tw_user_id', session.user.id);
      window.__AUTH_TOKEN__ = session.access_token;
      // تصفير بيانات المستخدم السابق
      window.bpContext = '';
      window.CFO_HISTORY = [];
      // مسح التقارير المحفوظة من المستخدم السابق وإعادة جلبها من Supabase
      localStorage.removeItem('tw_reports');
      STATE.savedReports = [];
      loadReportsFromDB();
    }
  });

  // إظهار اسم المستخدم في الواجهة
  const name = session.user?.user_metadata?.full_name
    || session.user?.email?.split('@')[0]
    || 'مستخدم';
  const greetEl = document.getElementById('userName');
  if (greetEl) greetEl.textContent = name;
})();

// ── تسجيل الخروج ──
function signOut() {
  const url  = window.__SUPABASE_URL__  || '';
  const anon = window.__SUPABASE_ANON__ || '';
  if (!url) { window.location.href = '/auth.html'; return; }
  const sb = window.supabase.createClient(url, anon);
  sb.auth.signOut().then(() => window.location.href = '/auth.html');
}
